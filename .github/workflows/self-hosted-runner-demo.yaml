# .github/workflows/self-hosted-runner-demo.yml
#
# This workflow runs on YOUR OWN Windows machine (self-hosted runner)
# instead of GitHub's cloud servers.

name: Self-Hosted Runner Demo (Python)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-test:

    # Run on your self-hosted runner
    runs-on: self-hosted

    # IMPORTANT: all commands will run inside this folder
    defaults:
      run:
        working-directory: Github_SelfRunner

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Show environment info
      - name: Show environment info
        run: |
          python --version
          pip list
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Name: ${{ runner.name }}"
          echo "Workflow triggered by: ${{ github.event_name }}"

      # Step 5: Run calculator script
      - name: Run calculator script
        run: python calculator.py

      # Step 6: Run tests with pytest
      - name: Run tests with pytest
        run: pytest test_calculator.py -v

      # Step 7: Job summary
      - name: Job summary
        run: |
          echo "All tests passed on self-hosted runner!"
          echo "This job ran on YOUR machine, not GitHub's cloud."
